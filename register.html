<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body{
      background-color:#0A0322 ;
      color: #FFFFFF;
    }
    header{
      font-family: Raleway;
      font-size: 30px;
      text-align: left;
      line-height:0.0001 ;
    }
    header div{
      font-family: Raleway;
      display: grid;
      position: absolute;
      top:7%;
      left:2%;
    }
    button :focus{
      border:none;
      outline:none;
      animation: changesize 0.5s;
}
@keyframes changesize{
0%{transform: scale(100%);}
50%{transform: scale(80%);}
100%{transform: scale(100%);}
}
#twalaba-btn{
  background: linear-gradient(to right,#9E0172,#740182);
  font-family: Raleway;
  color:#FFFFFF;
  height: 75px;
  width: 200px;
  border-top: 0px;
  border-left: 0px;
  border-radius:25px;
  position: absolute;
  top:48%;
  left: 23%;
}
#general-btn{
  background: linear-gradient(to right,#9E0172,#740182);
  font-family: Raleway;
  color:#FFFFFF;
  height: 75px;
  width: 200px;
  border-top: 0px;
  border-left: 0px;
  border-radius:25px;
  position: absolute;
  top:60%;
  left: 23%;
}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>WELCOME</h1>
      <h1 style="color:#c451c9;">BACK!!</h1>
    </div>
  </header>
  <main>
    <button id="twalaba-btn" onclick="window.location.href ='entrypage1.html'">TWALABA</button>
    <button id="general-btn" onclick="window.location.href ='entrypage1.html'">GENERAL</button>
  </main>
  <script>
    const twalabaBtn = document.getElementById('twalaba-btn');
    const generalBtn = document.getElementById('general-btn');
    const formData = {};

    twalabaBtn.addEventListener('click',(e) => {
      e.preventDefault();
      formData.category = 'twalaba';
      sessionStorage.setItem('formData', JSON.stringify(formData));
      window.location.href = 'entrypage1.html';
    });

    generalBtn.addEventListener('click',(e) => {
      e.preventDefault();
      formData.category = 'general';
      sessionStorage.setItem('formData', JSON.stringify(formData));
      window.location.href = 'entrypage1.html';
    });
  </script>
</body>
</html>
